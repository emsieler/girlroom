<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>girl room</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/lander.css" />
  </head>
  <body>
    <div class="marquee" aria-label="Marquee">
      <span id="marqueeText"></span>
    </div>

    <header class="logo-wrap">
      <img id="logoImg" class="logo-img" alt="girl room" hidden />
      <h1 class="logo-text" id="logoText">girl room</h1>
    </header>

    <main class="grid3">
      <aside class="side" id="sideLeft" aria-label="Left gallery"></aside>

      <section class="center">
        <div class="imac" id="imacRoot">
          <div class="imac__screen" id="playerWrap">
            <span class="imac__badge" id="liveBadge" hidden>LIVE</span>
            <button
              type="button"
              id="btnMute"
              class="imac__mute-corner is-muted"
              aria-label="unmute"
            >
              unmute
            </button>
            <video id="mainVideo" playsinline autoplay muted></video>
            <div class="imac__controls">
              <button type="button" id="btnPlayPause">play</button>
              <button type="button" id="btnBack10" data-vod-only hidden>
                -10s
              </button>
              <button type="button" id="btnFwd10" data-vod-only hidden>
                +10s
              </button>
              <input
                type="range"
                id="scrubber"
                class="scrubber"
                min="0"
                max="1000"
                step="1"
                value="0"
                aria-label="seek"
                data-vod-only
                hidden
              />
              <span class="time-display" id="timeDisplay" data-vod-only hidden
                >0:00 / 0:00</span
              >
              <button type="button" id="btnFs">fullscreen</button>
            </div>
          </div>
          <img class="imac__frame" src="assets/imac-frame.png" alt="" />
          <!-- Fades over the silver chin during the dive so it matches the
               black backdrop. Lives inside the iMac stacking context
               (z-index 9100) so it actually covers the chin. -->
          <div class="imac__chin-cover" aria-hidden="true"></div>
        </div>
        <div class="vod-strip" id="vodStrip"></div>
      </section>

      <aside class="side" id="sideRight" aria-label="Right gallery"></aside>
    </main>

    <nav class="bottom-nav">
      <a href="about.html">about</a>
      <a href="archive.html">archive</a>
      <a href="contact.html">contact</a>
    </nav>

    <!-- Slow dive backdrop: fades to black around the iMac during fullscreen
         entry, so it reads as zooming INTO the screen, not popping out. -->
    <div id="diveBackdrop" class="dive-backdrop" aria-hidden="true"></div>

    <!-- Fullscreen cinema shell: #playerWrap is reparented here once the
         dive completes, so controls / Esc exit work cleanly. -->
    <div id="cinemaHost" class="cinema-host" hidden></div>

    <script type="module" src="js/lander.js"></script>
  </body>
</html>
